<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>UN · ID · GEO</title>

<style>
body { background:#000; color:#0f0; font-family:monospace; text-align:center; padding:40px; }
#geo {
    width: 300px; height: 300px;
    margin: auto;
    border: 3px solid #6cf;
    border-radius: 50%;
    position: relative;
    animation: spin 12s linear infinite;
}
.dot {
    width: 10px; height: 10px;
    background:#0f0; border-radius:50%;
    position:absolute;
}
@keyframes spin { from { transform:rotate(0deg); } to { transform:rotate(360deg); } }
</style>
</head>

<body>

<h1>UN · ID · GEO</h1>
<div id="geo"></div>

<script>
const geo = document.getElementById("geo");
const count = 36;
const radius = 130;

for(let i=0; i<count; i++){
    const dot = document.createElement("div");
    dot.className = "dot";

    const angle = (i / count) * Math.PI * 2;
    const x = Math.cos(angle) * radius + 150 - 5;
    const y = Math.sin(angle) * radius + 150 - 5;

    dot.style.left = x + "px";
    dot.style.top = y + "px";

    geo.appendChild(dot);
}
</script>

</body>
</html>
